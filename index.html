<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Reva ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

</head>

<body>

<div id="stars"></div>
<div id="hearts"></div>
<div id="petals"></div>

<section class="hero">

<h1>
For
<span>Reva ❤️</span>
</h1>

<p>
Some people never leave your heart...
</p>

<button id="open">
💌 Open My Heart
</button>

</section>

<section id="letter" class="hidden">

<div class="glass">

<h2>Dear Reva ❤️</h2>

<p id="typing"></p>

<div class="signature">

— UR IDIOT ❤️

</div>

</div>

</section>

<section class="gallery">

<h2>Beautiful Memories ✨</h2>

<div class="images">

<img src="img1.jpg" alt="Memory 1">

<img src="img2.jpg" alt="Memory 2">

<img src="img3.jpg" alt="Memory 3">

</div>

</section>

<div class="music">

<button id="music">
🎵
</button>

<audio id="song" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>

</div>

<script src="script.js"></script>

</body>

</html>
